<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Parlay Pro</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --panel-bg: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --accent-blue: #3b82f6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            padding: 20px 10px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            height: fit-content;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 24px;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #3b82f6, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stake-section {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .input-group {
            position: relative;
            display: flex;
            align-items: center;
        }

        .currency-prefix {
            position: absolute;
            left: 12px;
            color: var(--text-muted);
            font-weight: 600;
        }

        input[type="text"], input[type="number"], select {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-main);
            padding: 12px;
            font-size: 16px;
            outline: none;
            transition: all 0.2s ease;
        }

        input[type="text"]:focus, input[type="number"]:focus, select:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        .stake-input {
            padding-left: 40px !important;
        }

        .match-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            position: relative;
            animation: fadeIn 0.25s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .match-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .match-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
        }

        .btn-delete {
            background: none;
            border: none;
            color: var(--accent-red);
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            padding: 4px 8px;
            border-radius: 6px;
        }

        .btn-delete:hover {
            background: rgba(239, 68, 68, 0.1);
        }

        .match-inputs {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 12px;
        }

        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 20px;
            margin-bottom: 24px;
        }

        .btn {
            padding: 14px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: var(--accent-blue);
            color: white;
        }

        .btn-primary:hover { background: #2563eb; }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover { background: rgba(255, 255, 255, 0.1); }

        .result-panel {
            background: linear-gradient(180deg, rgba(30, 41, 59, 0.9) 0%, rgba(15, 23, 42, 0.9) 100%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 20px;
            margin-top: 20px;
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .result-row:last-child {
            margin-bottom: 0;
            padding-top: 12px;
            border-top: 1px solid var(--border-color);
        }

        .result-label {
            font-size: 14px;
            color: var(--text-muted);
        }

        .result-value {
            font-size: 18px;
            font-weight: 700;
        }

        .text-big {
            font-size: 24px;
            color: var(--accent-green);
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 700;
        }

        .status-win { background: rgba(16, 185, 129, 0.15); color: var(--accent-green); }
        .status-lose { background: rgba(239, 68, 68, 0.15); color: var(--accent-red); }
    </style>
</head>
<body>

    <div class="container">
        <h1>Kalkulator Parlay</h1>

        <div class="stake-section">
            <label for="stake-input">Nominal Taruhan (Bet)</label>
            <div class="input-group">
                <span class="currency-prefix">Rp</span>
                <input type="number" id="stake-input" class="stake-input" placeholder="Contoh: 10000" value="10000">
            </div>
        </div>

        <div id="matches-container"></div>

        <div class="action-buttons">
            <button class="btn btn-secondary" id="btn-reset">Reset Semua</button>
            <button class="btn btn-primary" id="btn-add">Tambah Tim</button>
        </div>

        <div class="result-panel">
            <div class="result-row">
                <span class="result-label">Status Tiket</span>
                <span id="ticket-status" class="status-badge status-win">TEMBUS</span>
            </div>
            <div class="result-row">
                <span class="result-label">Total Odds Akhir</span>
                <span id="total-odds" class="result-value">1,00</span>
            </div>
            <div class="result-row">
                <span class="result-label">Total Bayaran (Payout)</span>
                <span id="total-payout" class="result-value text-big">Rp 0</span>
            </div>
        </div>
    </div>

    <script>
        // State management terpusat
        const state = {
            stake: 10000,
            matches: []
        };

        // Inisialisasi awal aplikasi
        const init = () => {
            const saved = localStorage.getItem('parlay_state_v2');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    state.stake = parsed.stake || 10000;
                    state.matches = parsed.matches || [];
                } catch (e) {
                    loadDefaultMatches();
                }
            } else {
                loadDefaultMatches();
            }
            
            document.getElementById('stake-input').value = state.stake;
            renderMatches();
            calculate();
        };

        const loadDefaultMatches = () => {
            state.matches = [
                { id: generateId(), odd: "1,85", status: "win" },
                { id: generateId(), odd: "1,75", status: "win" },
                { id: generateId(), odd: "1,90", status: "win" }
            ];
        };

        const generateId = () => '_' + Math.random().toString(36).substr(2, 9);

        const saveState = () => {
            localStorage.setItem('parlay_state_v2', JSON.stringify(state));
        };

        // Fungsi manipulasi data
        window.updateMatch = (id, field, value) => {
            const match = state.matches.find(m => m.id === id);
            if (match) {
                if (field === 'odd') {
                    value = value.replace(/[^0-9.,]/g, '');
                }
                match[field] = value;
                calculate();
            }
        };

        window.updateMatchStatus = (id, selectEl) => {
            const match = state.matches.find(m => m.id === id);
            if (match) {
                match.status = selectEl.value;
                if (selectEl.value === 'half_lose') {
                    match.odd = "0,5";
                    const card = document.getElementById(`match-${id}`);
                    if (card) {
                        const oddInput = card.querySelector('input[inputmode="decimal"]');
                        if (oddInput) oddInput.value = "0,5";
                    }
                }
                calculate();
            }
        };

        window.validateOdd = (input, id) => {
            let cleanVal = input.value.replace(',', '.');
            let val = parseFloat(cleanVal);
            const match = state.matches.find(m => m.id === id);
            
            let minLimit = (match && match.status === 'half_lose') ? 0.00 : 1.00;
            
            if (isNaN(val) || val < minLimit) {
                val = minLimit === 0 ? 0.5 : 1.00;
            }
            input.value = val.toString().replace('.', ',');
            updateMatch(id, 'odd', input.value);
        };

        window.deleteMatch = (id) => {
            state.matches = state.matches.filter(m => m.id !== id);
            renderMatches();
            calculate();
        };

        // Fungsi perhitungan core matematika parlay
        window.calculate = () => {
            let totalOdds = 1;
            let isTotalLose = false;

            state.matches.forEach(m => {
                let cleanOdd = m.odd.toString().replace(',', '.');
                let odd = parseFloat(cleanOdd) || 0;

                if (m.status === 'lose') {
                    isTotalLose = true;
                } else if (m.status === 'win') {
                    totalOdds *= odd;
                } else if (m.status === 'half_win') {
                    totalOdds *= (1 + ((odd - 1) / 2));
                } else if (m.status === 'half_lose') {
                    totalOdds *= 0.5;
                }
            });

            if (state.matches.length === 0) totalOdds = 0;

            const finalOdds = isTotalLose ? 0 : totalOdds;
            const payout = state.stake * finalOdds;

            // Update UI hasil
            const statusEl = document.getElementById('ticket-status');
            if (isTotalLose) {
                statusEl.textContent = "LOSE TIKET";
                statusEl.className = "status-badge status-lose";
            } else {
                statusEl.textContent = "TEMBUS";
                statusEl.className = "status-badge status-win";
            }

            document.getElementById('total-odds').textContent = finalOdds.toFixed(3).replace('.', ',');
            document.getElementById('total-payout').textContent = "Rp " + Math.floor(payout).toLocaleString('id-ID');
            
            saveState();
        };

        // Render komponen ke layar HTML
        const renderMatches = () => {
            const container = document.getElementById('matches-container');
            container.innerHTML = '';

            state.matches.forEach((match, index) => {
                const card = document.createElement('div');
                card.className = 'match-card';
                card.id = `match-${match.id}`;
                card.innerHTML = `
                    <div class="match-header">
                        <span class="match-title">Tim #${index + 1}</span>
                        <button class="btn-delete" onclick="deleteMatch('${match.id}')">Hapus</button>
                    </div>
                    <div class="match-inputs">
                        <div>
                            <label>Nilai Odd</label>
                            <input type="text" inputmode="decimal" placeholder="Odd" value="${match.odd}" 
                                onblur="validateOdd(this, '${match.id}')" oninput="updateMatch('${match.id}', 'odd', this.value)">
                        </div>
                        <div>
                            <label>Hasil Pertandingan</label>
                            <select onchange="updateMatchStatus('${match.id}', this)">
                                <option value="win" ${match.status === 'win' ? 'selected' : ''}>Menang Full</option>
                                <option value="half_win" ${match.status === 'half_win' ? 'selected' : ''}>Menang 1/2</option>
                                <option value="draw" ${match.status === 'draw' ? 'selected' : ''}>Draw (Seri)</option>
                                <option value="half_lose" ${match.status === 'half_lose' ? 'selected' : ''}>Kalah 1/2</option>
                                <option value="lose" ${match.status === 'lose' ? 'selected' : ''}>Kalah Full</option>
                            </select>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        };

        // Event Listeners tombol utama
        document.getElementById('btn-add').addEventListener('click', () => {
            state.matches.push({ id: generateId(), odd: "1,85", status: "win" });
            renderMatches();
            calculate();
        });

        document.getElementById('btn-reset').addEventListener('click', () => {
            if (confirm('Reset ulang seluruh data parlay?')) {
                loadDefaultMatches();
                renderMatches();
                calculate();
            }
        });

        document.getElementById('stake-input').addEventListener('input', (e) => {
            state.stake = parseFloat(e.target.value) || 0;
            calculate();
        });

        // Jalankan program utama saat window siap
        window.onload = init;
    </script>
</body>
</html>
